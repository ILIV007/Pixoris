    <rect x="2" y="10" width="14" height="2"/>
    <rect x="20" y="10" width="10" height="2"/>
    <rect x="0" y="12" width="14" height="2"/>
    <rect x="22" y="12" width="10" height="2"/>
    <rect x="0" y="14" width="12" height="2"/>
    <rect x="24" y="14" width="8" height="2"/>
    <rect x="0" y="16" width="12" height="2"/>
    <rect x="24" y="16" width="8" height="2"/>
    <rect x="0" y="18" width="12" height="2"/>
    <rect x="22" y="18" width="10" height="2"/>
    <rect x="2" y="20" width="14" height="2"/>
    <rect x="20" y="20" width="10" height="2"/>
    <rect x="4" y="22" width="24" height="2"/>
    <rect x="6" y="24" width="20" height="2"/>
