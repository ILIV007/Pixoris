<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pixoris Favicon — Clean Pac-Man with transparent background -->
  <defs>
    <radialGradient id="pacGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff064"/>
      <stop offset="100%" stop-color="#ffd84c"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#ffd84c" stroke-width="1" opacity="0.3"/>

  <!-- Pac-Man body -->
  <path d="M 32 6 A 26 26 0 1 1 32 58 A 26 26 0 1 1 32 6 Z M 32 32 L 58 20 L 58 44 Z"
        fill="url(#pacGrad)" filter="url(#glow)"/>

  <!-- Eye -->
  <circle cx="28" cy="22" r="3.5" fill="#070b16"/>

  <!-- Highlight -->
  <ellipse cx="24" cy="18" rx="6" ry="4" fill="#fff8b0" opacity="0.5"/>
</svg>
